# ① 프론트 EC2 스택 — Next.js
# NEXT_PUBLIC_API_URL은 이미지에 "빌드 시점"에 구워짐(workflow build-arg) → 런타임 .env 불필요.
# ECR_REGISTRY는 GitHub Actions ssh 스텝에서 export로 주입한다.

services:
  frontend:
    image: ${ECR_REGISTRY}/codebomb-frontend:latest
    container_name: lms-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - API_PROXY_TARGET=http://172.31.45.217:8080   # ← codebomb-spring 사설IP (SSR 전용, 브라우저는 상대경로 /api→ALB)
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
