name: "✨ Feature"
description: "새로운 기능 추가"
labels: ["feature"]

body:
  - type: textarea
    id: description
    attributes:
      label: "📄 설명"
      description: "새로운 기능에 대한 설명을 작성해 주세요."
      placeholder: "자세히 적을수록 좋습니다!"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업할 내용"
      description: "할 일을 체크박스 형태로 작성해주세요."
      placeholder: "- [ ] 최대한 세분화 해서 적어주세요!"
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "🙋🏻  기타"
      description: "기타 자료가 있으면 작성해 주세요."
      placeholder: "링크, 문서, 이미지 등"
    validations:
      required: false
