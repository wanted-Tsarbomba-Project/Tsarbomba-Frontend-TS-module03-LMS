name: Deploy Frontend (① EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 동시 배포 방지 (연속 push/중복 dispatch 시 race condition 차단)
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read              # 최소 권한 (배포는 읽기만 필요)
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # 이후 스텝에 토큰 잔존 방지

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 린트 (비차단 — 기존 위반 7건 정리 전까지, 정리 후 continue-on-error 제거해 차단으로)
        run: npm run lint
        continue-on-error: true
        # type-check/test 스크립트는 미존재. 타입검사는 아래 Docker의 next build가 수행.

      - name: AWS 자격증명 (codebomb-ci)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드 & ECR 푸시
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: codebomb-frontend
          TAG: ${{ github.sha }}
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}   # env로 받아 인젝션 방지
        run: |
          set -euo pipefail
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$API_URL" \
            -t "$REGISTRY/$REPO:$TAG" -t "$REGISTRY/$REPO:latest" .
          docker push "$REGISTRY/$REPO:$TAG"
          docker push "$REGISTRY/$REPO:latest"

      - name: ① EC2로 배포파일 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/**"
          target: "/opt/frontend"
          strip_components: 1

      - name: ① EC2에서 pull & 기동
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            set -e
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            cd /opt/frontend
            export ECR_REGISTRY="$ECR_REGISTRY"
            docker compose pull
            docker compose up -d
            # 헬스 체크: 3000이 응답하는지 (curl -s라 5xx도 '응답'으로 인정 — 지금은 ② 없어 SSR 에러 가능)
            echo "헬스 체크: localhost:3000 응답 대기..."
            for i in $(seq 1 30); do
              if curl -s -o /dev/null http://localhost:3000; then
                echo "OK: 서버 응답 확인"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "FAIL: 30회(약 60초) 후에도 무응답"
                docker compose logs --tail 50
                exit 1
              fi
              sleep 2
            done
            docker image prune -f
